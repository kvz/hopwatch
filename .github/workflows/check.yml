name: check

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  cancel-in-progress: true
  group: check-${{ github.ref }}

jobs:
  check:
    name: lint + typecheck + tests
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - name: Install apt deps (rrdtool + fonts + mtr)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            fonts-dejavu-core \
            mtr-tiny \
            rrdtool

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint
        run: bun run lint

      - name: Typecheck
        run: bun run typecheck

      - name: Tests (vitest, incl. visual regression)
        run: bun run test

      - name: Upload visual diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: |
            src/test/fixtures/mtr-fixtures/real-ap/diff-snapshots/
          retention-days: 7
          if-no-files-found: ignore
