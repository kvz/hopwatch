name: binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build binaries for (e.g. v0.1.0)"
        required: true
  # Called by release.yml after changesets publishes a GitHub release.
  # Events emitted by GITHUB_TOKEN (including `release.published` from
  # changesets/action) do not start downstream workflow runs, so we rely on an
  # explicit workflow_call to kick this pipeline off.
  workflow_call:
    inputs:
      tag:
        description: "Release tag to build binaries for"
        required: true
        type: string

concurrency:
  cancel-in-progress: false
  group: binaries-${{ inputs.tag || github.event.release.tag_name || github.event.inputs.tag }}

permissions:
  contents: write

jobs:
  compile:
    name: compile ${{ matrix.asset }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset: hopwatch-linux-x64
          - target: bun-linux-arm64
            asset: hopwatch-linux-arm64
          - target: bun-darwin-x64
            asset: hopwatch-darwin-x64
          - target: bun-darwin-arm64
            asset: hopwatch-darwin-arm64
    steps:
      - name: Resolve tag
        id: tag
        # Free-form `workflow_dispatch.inputs.tag` and downstream release names
        # should never be interpolated straight into shell. A tag like
        # `"; rm -rf /` would otherwise execute on the release runner with
        # `contents: write`. Pass each candidate through `env:` and quote the
        # shell expansion so the value is always treated as data.
        env:
          CALL_TAG: ${{ inputs.tag }}
          RELEASE_TAG: ${{ github.event.release.tag_name }}
          DISPATCH_TAG: ${{ github.event.inputs.tag }}
        run: |
          if [ -n "$CALL_TAG" ]; then
            resolved="$CALL_TAG"
          elif [ -n "$RELEASE_TAG" ]; then
            resolved="$RELEASE_TAG"
          else
            resolved="$DISPATCH_TAG"
          fi
          # Defence in depth: only allow the SemVer-ish tag characters we
          # actually emit via changesets (digits, dots, letters, hyphen, plus,
          # underscore, leading `v`). Anything else is refused up-front.
          if ! printf '%s' "$resolved" | grep -Eq '^[A-Za-z0-9._+-]+$'; then
            echo "refusing tag with unexpected characters: $resolved" >&2
            exit 1
          fi
          echo "tag=$resolved" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          lfs: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        env:
          BUN_TARGET: ${{ matrix.target }}
          ASSET_NAME: ${{ matrix.asset }}
        run: |
          mkdir -p bin-build
          bun build ./src/bin/hopwatch.ts \
            --compile \
            --target="$BUN_TARGET" \
            --outfile "./bin-build/$ASSET_NAME"

      - name: Package
        env:
          ASSET_NAME: ${{ matrix.asset }}
        run: |
          cd bin-build
          # The release asset keeps its platform suffix (for disambiguation on
          # the releases page), but inside the tarball we always call the
          # binary `hopwatch`. That way the install commands in README.md -
          # `tar -xz -C /usr/local/bin` followed by `./hopwatch` - work without
          # a post-extract rename.
          cp "$ASSET_NAME" hopwatch
          tar -czf "$ASSET_NAME.tar.gz" hopwatch
          sha256sum "$ASSET_NAME.tar.gz" > "$ASSET_NAME.tar.gz.sha256"

      - name: Attach to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.tag }}
          ASSET_NAME: ${{ matrix.asset }}
        run: |
          gh release upload "$RELEASE_TAG" \
            "bin-build/$ASSET_NAME.tar.gz" \
            "bin-build/$ASSET_NAME.tar.gz.sha256" \
            --clobber
