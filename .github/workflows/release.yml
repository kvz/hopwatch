name: release

on:
  push:
    branches:
      - main

concurrency:
  cancel-in-progress: false
  group: release

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    name: changesets
    runs-on: ubuntu-24.04
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Create Release Pull Request or GitHub Release
        id: changesets
        uses: changesets/action@v1
        with:
          title: "chore: release"
          commit: "chore: release"
          version: bun run changeset:version
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # The `release.published` event emitted by changesets/action running under
  # GITHUB_TOKEN does not trigger binaries.yml's own `release` listener
  # (GitHub intentionally suppresses workflow chaining from the default token
  # to prevent loops). Calling binaries.yml via `workflow_call` is therefore
  # the only way to publish tarballs automatically for a changesets release;
  # without this, tagged releases would land on the Releases page with the
  # README install commands pointing at a 404.
  binaries:
    name: build binaries
    needs: release
    if: needs.release.outputs.published == 'true'
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        package: ${{ fromJson(needs.release.outputs.publishedPackages) }}
    uses: ./.github/workflows/binaries.yml
    with:
      tag: v${{ matrix.package.version }}
