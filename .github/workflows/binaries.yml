name: binaries

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build binaries for (e.g. v0.1.0)"
        required: true

concurrency:
  cancel-in-progress: false
  group: binaries-${{ github.event.release.tag_name || github.event.inputs.tag }}

permissions:
  contents: write

jobs:
  compile:
    name: compile ${{ matrix.asset }}
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: bun-linux-x64
            asset: hopwatch-linux-x64
          - target: bun-linux-arm64
            asset: hopwatch-linux-arm64
          - target: bun-darwin-x64
            asset: hopwatch-darwin-x64
          - target: bun-darwin-arm64
            asset: hopwatch-darwin-arm64
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.release.tag_name }}" ]; then
            echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.tag }}
          lfs: true

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build binary
        run: |
          mkdir -p bin-build
          bun build ./src/bin/hopwatch.ts \
            --compile \
            --target=${{ matrix.target }} \
            --outfile ./bin-build/${{ matrix.asset }}

      - name: Package
        run: |
          cd bin-build
          tar -czf ${{ matrix.asset }}.tar.gz ${{ matrix.asset }}
          sha256sum ${{ matrix.asset }}.tar.gz > ${{ matrix.asset }}.tar.gz.sha256

      - name: Attach to GitHub release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.tag.outputs.tag }}" \
            bin-build/${{ matrix.asset }}.tar.gz \
            bin-build/${{ matrix.asset }}.tar.gz.sha256 \
            --clobber
