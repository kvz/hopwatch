[server]
# Loopback-only by default - hop topology + reverse-DNS is sensitive and
# hopwatch ships without auth. Front with nginx (see README) or set
# `listen = "0.0.0.0:8080"` explicitly to expose on every interface.
listen     = "127.0.0.1:8080"
data_dir   = "./hopwatch-data"
node_label = "dev"

[identity]
# Optional source context used in escalation copy. `hostname` is auto-discovered
# when omitted, and `public_hostname` falls back to the request Host header.
# Provider/datacenter labels are environment-specific and should be configured.
hostname        = "probe-host.example.com"
public_hostname = "hopwatch.example.com"
site_label      = "example-dc-1"
# egress_ip can be configured directly, or discovered at startup by setting
# egress_ip_lookup_url to a plain-text IP endpoint such as https://api.ipify.org.
# egress_ip            = "203.0.113.10"
# egress_ip_lookup_url = "https://api.ipify.org"

[probe]
interval_seconds = 900
packets          = 20
ip_version       = 4
mtr_bin          = "mtr"
concurrency      = 3
keep_days        = 14
jitter_seconds   = 30
# For targets with probe_mode = "netns", hopwatch runs:
#   nsenter --mount=<namespace_dir>/<target.netns>/mnt/ns \
#           --net=<namespace_dir>/<target.netns>/net/ns <mtr_bin> …
# Leave empty unless you run probes from Linux network namespaces.
namespace_dir    = ""

[chart]
# Rotated signature rendered along the right edge of every chart.
# Defaults to "RRDTOOL / TOBI OETIKER" as attribution to Tobi Oetiker,
# whose SmokePing/rrdtool work inspired hopwatch. Set to "" to hide.
signature = "RRDTOOL / TOBI OETIKER"

[[target]]
id    = "cloudflare"
label = "Cloudflare public"
host  = "cloudflare.com"

[[target]]
id    = "google-dns"
label = "Google DNS"
host  = "8.8.8.8"

# Example netns target (requires probe.namespace_dir set to the host ns root):
# [[target]]
# id         = "google-via-allow-external"
# label      = "Google (via allow-external ns)"
# host       = "google.com"
# probe_mode = "netns"
# netns      = "allow-external"

# Example TCP target. Use `protocol = "tcp"` when the production workload is
# HTTPS/TCP - ICMP and TCP loss can diverge by tens of percentage points on
# paths where a router rate-limits one protocol but forwards the other.
# Works with engine="mtr" (via `mtr --tcp -P <port>`) or engine="native" (via
# the built-in Bun FFI tracer - no external mtr process required).
# [[target]]
# id       = "s3-us-west-2-tcp"
# label    = "Amazon S3 us-west-2 (TCP 443)"
# host     = "s3.us-west-2.amazonaws.com"
# protocol = "tcp"
# port     = 443

[[peer]]
id    = "eu"
url   = "https://hopwatch-eu.example.com"
label = "EU"

[[peer]]
id    = "us"
url   = "https://hopwatch-us.example.com"
label = "US"
